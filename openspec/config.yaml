schema: spec-driven

context: |
  Tech stack: TypeScript, ESM, Node.js >=18, SQLite (better-sqlite3), zod
  Architecture: src/ with store/, tools/, utils/, sync/, http-* modules
  Testing: vitest, in-memory SQLite for isolation, 10s timeout
  Style: no linter; semicolons, single quotes dominant
  CI: none configured

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    guidance:
      - Include sequence diagrams for complex flows
      - Document architecture decisions with rationale
    sub_artifacts: false
    complexity_threshold:
      affected_domains: 3
      affected_files: 12
      external_research: true
  tasks:
    guidance:
      - Group tasks by phase (infrastructure, implementation, testing)
      - Use hierarchical numbering (1.1, 1.2, etc.)
      - Keep tasks small enough to complete in one session
    traceability: true
    parallel_markers: false
  apply:
    - Follow existing code patterns and conventions
    tdd: false
    test_command: 'pnpm test'
  verify:
    test_command: 'pnpm test'
    build_command: 'pnpm run build'
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
  constitution:
    path: openspec/memory/constitution.md
    enforce_check: true
    version_policy: semver
  consistency:
    enforce_block: true
    require_coverage_percentage: true
  requirements_quality:
    enforce_block: true
    dimensions:
      - completeness
      - clarity
      - measurability
      - testability
  clarification:
    max_markers_per_spec: 3
  handoffs:
    surface_hints: true
