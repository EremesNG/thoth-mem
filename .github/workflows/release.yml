name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - name: Update npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck dashboard
        run: pnpm run dashboard:typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Run retrieval eval
        run: pnpm run eval:retrieval

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: pnpm tsx scripts/generate-release-notes.ts release-notes.md

      - name: Publish to npm
        run: npm publish

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          --verify-tag
          --title "${GITHUB_REF_NAME}"
          --notes-file release-notes.md
